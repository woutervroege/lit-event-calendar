    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        :root {
            --grid-size: 120px;
            --grid-cols: 20;
            --grid-rows: 20;
            --grid-width: calc(var(--grid-cols) * var(--grid-size));
            --grid-height: calc(var(--grid-rows) * var(--grid-size));
            --sidebar-width: 20vw;
            --header-height: 240px;
        }

        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }
        body {
            width: 100%;
        }

        .scroll-root {
            width: 100vw;
            height: 100vh;
            overflow-x: auto;
            overflow-y: auto;
            scroll-snap-type: x mandatory;
        }

        .grid-canvas {
            position: relative;
            width: var(--grid-width);
            height: var(--grid-height);
        }

        .snap-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--grid-width);
            height: var(--grid-height);
            pointer-events: none;
            opacity: 0;
            z-index: 0;
        }

        .snap-grid {
            display: grid;
            grid-template-columns: repeat(var(--grid-cols), var(--grid-size));
            grid-template-rows: repeat(var(--grid-rows), var(--grid-size));
        }

        .snap-cell {
            width: var(--grid-size);
            height: var(--grid-size);
            scroll-snap-align: start;
            scroll-snap-stop: normal;
        }

        .layout {
            position: relative;
            z-index: 1;
            display: grid;
            width: var(--grid-width);
            height: var(--grid-height);
            grid-template-columns: var(--sidebar-width) calc(var(--grid-width) - var(--sidebar-width));
            grid-template-rows: var(--header-height) calc(var(--grid-height) - var(--header-height));
            grid-template-areas:
                "header-sidebar header-content"
                "main-sidebar main-content";
        }

        .sidebar {
            width: var(--sidebar-width);
            background-color: lightblue;
        }

        .header-sidebar {
            grid-area: header-sidebar;
            position: fixed;
            top: 0;
            left: 0;
            height: var(--header-height);
            border-bottom: 3px solid blue;
            z-index: 150;
        }

        .main-sidebar {
            grid-area: main-sidebar;
            position: fixed;
            top: var(--header-height);
            left: 0;
            height: calc(100vh - var(--header-height));
            z-index: 120;
        }

        .header-content,
        .main-content {
            border-left: 3px solid yellow;
            background-image:
                linear-gradient(to right, rgba(0, 0, 0, 0.25) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 0, 0, 0.25) 1px, transparent 1px);
            background-size: var(--grid-size) var(--grid-size);
        }

        .header-content {
            grid-area: header-content;
            position: sticky;
            top: 0;
            z-index: 140;
            background-color: white;
            border-bottom: 3px solid blue;
        }

        .main-content {
            grid-area: main-content;
        }

    </style>
</head>
